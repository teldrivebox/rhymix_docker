name: Build and Push to Docker Hub (Release)

on:
  release:
    types: [published] # GitHub에서 릴리즈가 '게시'되었을 때만 실행
  workflow_dispatch:   # 테스트를 위해 수동 실행 버튼은 남겨둡니다.

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          # latest 태그와 함께 릴리즈 버전(v1.0.0 등) 태그도 자동으로 붙입니다.
          tags: |
            teldrivebox/rhymix-caddy-php:latest
            teldrivebox/rhymix-caddy-php:${{ github.event.release.tag_name }}
