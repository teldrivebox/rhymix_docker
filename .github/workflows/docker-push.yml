name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main", "master" ] # Gitea에서 미러링된 코드가 GitHub의 메인 브랜치에 들어올 때 작동
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  docker:
    runs-on: ubuntu-latest # GitHub이 제공하는 무료 서버 (내 서버 CPU 소모 0)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64 # x86과 ARM 둘 다 빌드
          push: true
          tags: teldrivebox/rhymix-caddy-php:latest
